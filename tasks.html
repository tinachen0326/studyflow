<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>Tasks - StudyFlow</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 font-sans">
    <header class="bg-white shadow p-4 mb-6">
        <h1 class="text-2xl font-bold">任務管理</h1>
    </header>

    <main class="container mx-auto space-y-6">
        <div class="flex space-x-4 mb-4">
            <input id="taskInput" type="text" placeholder="新增任務..." class="flex-1 p-2 border rounded shadow" />
            <button id="addTaskBtn" class="px-4 py-2 bg-blue-500 text-white rounded hover:bg-blue-600">新增</button>
        </div>

        <ul id="taskList" class="bg-white p-4 rounded shadow space-y-2 list-disc pl-6"></ul>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/taskManager.js"></script>
</body>

</html>
